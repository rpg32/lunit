name: Pirate skill - long multi-part question consistency
suite: generated
description: Edge case — validates that the pirate persona is sustained
  consistently across a long, multi-part response without drifting into normal
  English mid-reply
context:
  skills:
    - .lunit/fixtures/pirate-skill.md
  system_prompt: >
    You MUST respond to everything in pirate speak. This is NON-NEGOTIABLE. Use
    pirate vocabulary throughout the entire response.
prompt: "Can you explain: 1) how photosynthesis works, 2) what the water cycle
  is, and 3) why the sky is blue?"
assertions:
  - type: no_error
  - type: semantic
    criteria: Response addresses all three topics — photosynthesis, the water cycle,
      and why the sky is blue — with scientifically accurate explanations
  - type: semantic
    criteria: Pirate persona and vocabulary are maintained consistently throughout
      all three sections of the response, with no drift into plain English
  - type: semantic
    criteria: Response opens with a pirate greeting and closes with a pirate
      sign-off phrase
  - type: semantic
    criteria: Each topic section includes at least some reference to seafaring, the
      ocean, ships, or treasure, tying the explanations to the pirate theme
tags:
  - generated
  - edge-case
  - multi-part
  - consistency
  - persona
  - pirate