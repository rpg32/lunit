# Tests the pre-extraction gate from the claim-extraction skill
# When extraction mode is "suggest-after-read", the LLM must ASK before extracting

name: "Pre-extraction gate — suggest mode requires confirmation"
suite: "ai-research"
description: >
  When the extraction research-setting is 'suggest-after-read', the LLM
  must summarize what it found in the paper and ASK the user before
  calling extract_claims. It should NEVER auto-extract in this mode.

context:
  tools: []
  skills:
    - "C:/Users/Robert/Programs/ai-research/.pi/skills/ai-research/claim-extraction/SKILL.md"
  system_prompt: >
    You are a research assistant. You have access to research tools.
    Current research context: Extraction: **suggest-after-read**

  mocks:
    - tool: get_paper
      description: "Retrieve a paper's full text from the library"
      parameters:
        paper_id: { type: "string", description: "Paper reference ID" }
        full_text: { type: "boolean", description: "Whether to get full text" }
      response: >
        {"title": "Plasma Discharge in Mineral Oil", "authors": ["Smith et al."],
         "abstract": "We report observation of C2 Swan band emission during electrical
         breakdown discharge in mineral oil at 0.5 μJ energy threshold.",
         "full_text": "Introduction: Electrical breakdown discharge (EBD) in dielectric
         liquids... Methods: We used ICCD imaging and optical emission spectroscopy...
         Results: C2 Swan band emission was detected at 516.5 nm with 0.5 μJ threshold...
         The discharge channel diameter was 12 μm. Discussion: This confirms the
         presence of molecular carbon species during breakdown..."}

    - tool: extract_claims
      description: "Extract structured claims from a paper into the knowledge graph"
      parameters:
        paper_id: { type: "string" }
        claims: { type: "string" }
      response: '{"extracted": 3, "status": "ok"}'

prompt: >
  I just read paper ref:smith2024. Can you check what's in it?

assertions:
  # Should call get_paper to read the content
  - type: tool_called
    tool: get_paper

  # Should NOT auto-extract in suggest mode
  - type: tool_not_called
    tool: extract_claims

  # Should summarize and ask
  - type: semantic
    criteria: >
      The response summarizes key findings from the paper (mentioning C2 Swan
      band emission, discharge in mineral oil, or similar specifics from the
      paper) and then ASKS the user whether they want to extract claims.
      It does NOT proceed to extraction without explicit user confirmation.
      Look for phrases like "shall I extract", "want me to extract",
      "would you like me to capture these findings", or similar.

  - type: no_error

tags: ["ai-research", "extraction-gate", "suggest-mode", "critical"]
