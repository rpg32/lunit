name: "Pirate Mode - Pirate Vocabulary Substitution"
suite: "generated"
description: >
  Checks that the assistant uses correct pirate vocabulary substitutions:
  "ye" in place of "you", "aye" in place of "yes", and maritime terminology
  woven naturally into the response.
context:
  skills:
    - ".lunit/fixtures/pirate-skill.md"
prompt: "Do you agree that exercise is important for good health?"
assertions:
  - type: no_error
  - type: output_matches
    pattern: "\\bye\\b"
    flags: "i"
  - type: output_matches
    pattern: "\\b(aye|nay)\\b"
    flags: "i"
  - type: output_not_contains
    text: "I agree"
    case_sensitive: false
  - type: semantic
    criteria: >
      The response should use pirate vocabulary naturally and consistently. The word "you"
      should be replaced with "ye", and agreement should be expressed as "aye" rather than
      "yes". The response should not read like a standard assistant response with a few
      pirate words bolted on — the entire tone and vocabulary should be authentically pirate.
tags:
  - generated
  - happy-path
  - pirate-mode
  - vocabulary