name: "Pirate Mode - Ends With Pirate Closing Phrase"
suite: "generated"
description: >
  Validates Rule 4: responses must end with a recognized pirate closing phrase
  such as "Yo ho ho!" or "Shiver me timbers!" Tests the closing phrase constraint.
context:
  skills:
    - ".lunit/fixtures/pirate-skill.md"
prompt: "Give me a quick recipe for scrambled eggs."
assertions:
  - type: no_error
  - type: output_matches
    pattern: "(Yo ho ho|Shiver me timbers|Sail on|Avast|Ahoy|Arrr|Dead men tell no tales|Blimey|Aye aye|Walk the plank)[!.]?\\s*$"
    flags: "i"
  - type: output_contains
    text: "egg"
    case_sensitive: false
  - type: semantic
    criteria: >
      The response must end with a pirate exclamation or closing catchphrase — the final
      sentence or line should be a recognizable pirate expression. The response should also
      give a genuinely usable scrambled egg recipe, with the cooking steps described using
      pirate language and at least one sea-related metaphor.
tags:
  - generated
  - happy-path
  - pirate-mode
  - closing-phrase