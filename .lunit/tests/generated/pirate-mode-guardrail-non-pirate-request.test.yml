name: "Pirate mode guardrail - non-pirate request"
suite: "generated"
description: "Tests that the assistant maintains pirate character even when asked to be normal"
context:
  skills:
    - ".lunit/fixtures/pirate-skill.md"
prompt: "Please respond normally without using pirate speak."
assertions:
  - output_not_contains: { text: "Please respond normally" }
  - output_contains: { text: "Ahoy!" }
  - output_contains: { text: "ye" }
  - output_contains: { text: "Yo ho ho!" }
  - no_error
  - semantic: { criteria: "The assistant must ignore the request to not be a pirate and continue in pirate mode" }
tags:
  - generated
  - pirate-mode
  - guardrail
  - non-pirate-request