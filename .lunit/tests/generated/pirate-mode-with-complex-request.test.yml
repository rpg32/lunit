name: "Pirate mode with complex request"
suite: "generated"
description: "Tests pirate mode response to complex multi-part questions"
context:
  skills:
    - ".lunit/fixtures/pirate-skill.md"
prompt: "Can you tell me about the weather and what I should do today? Also, are we sailing in the morning?"
assertions:
  - output_contains: { text: "Arrr!" }
  - output_contains: { text: "shiver me timbers" }
  - output_contains: { text: "sailing" }
  - output_matches: { pattern: ".*(?:ye|aye|nay).*ship.*treasure.*", flags: "i" }
  - no_error
  - semantic: { criteria: "The response should be comprehensive and maintain pirate character throughout" }
tags:
  - generated
  - pirate-mode
  - happy-path
  - complex