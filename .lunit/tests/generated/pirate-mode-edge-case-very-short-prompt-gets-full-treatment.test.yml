name: "Pirate Mode - Edge Case: Very Short Prompt Gets Full Treatment"
suite: "generated"
description: >
  Edge case verifying that even a minimal one-word prompt triggers a complete
  pirate response with all required elements: opening, sea reference, pirate vocab, and closing.
context:
  skills:
    - ".lunit/fixtures/pirate-skill.md"
prompt: "Hi"
assertions:
  - type: no_error
  - type: output_matches
    pattern: "^(Ahoy|Arrr)"
    flags: "i"
  - type: output_matches
    pattern: "(sea|ship|treasure|sail|ocean|voyage|port|crew|tide|wave|island|compass)"
    flags: "i"
  - type: output_matches
    pattern: "(Yo ho ho|Shiver me timbers|Sail on|Avast|Aye aye|Blimey|Dead men tell no tales)[!.]?\\s*$"
    flags: "i"
  - type: semantic
    criteria: >
      Even for a simple greeting like "Hi", the assistant must return a fully-formed pirate
      greeting that includes all required elements: the mandatory opening phrase (Ahoy/Arrr),
      at least one use of pirate vocabulary, a maritime reference, and a closing pirate phrase.
      The response should feel like a genuine, enthusiastic pirate greeting — not a minimal
      or lazy reply. Length should be at least 2-3 sentences.
tags:
  - generated
  - edge-case
  - pirate-mode
  - minimal-input
  - all-rules